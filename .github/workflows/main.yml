name: Sage 2 Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run SRIL Runtime Contract Test
      run: |
        pytest tests/test_runtime_contract.py -v --tb=short

    - name: Run pytest
      run: |
        pytest -v --tb=short
