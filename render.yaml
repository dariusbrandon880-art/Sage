services:
  - type: web
    name: sage-1
    env: python
    plan: free
    healthCheckPath: /health
    buildCommand: "pip install --upgrade pip && pip install . google-api-python-client google-auth-oauthlib google-auth-httplib2"
    startCommand: "uvicorn sage.api:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: SAGE_REQUIRE_AUTH
        value: "true"
      - key: SAGE_API_KEYS
        generateValue: true
      - key: MEMORY_BACKEND
        value: in-memory
      - key: ARCHIVE_BACKEND
        value: in-memory
      - key: ENABLE_CONTINUITY
        value: "true"
      - key: GOOGLE_WORKSPACE_CREDENTIALS_PATH
        value: sage_data/credentials.json
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
