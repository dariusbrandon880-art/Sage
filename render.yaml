services:
  - type: web
    name: sage-runtime
    env: python
    plan: free
    buildCommand: "pip install poetry && poetry config virtualenvs.create false && poetry install --no-interaction --no-ansi --only main"
    startCommand: "python -m uvicorn sage.api:app --host 0.0.0.0 --port 8000"
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: SAGE_REQUIRE_AUTH
        value: "true"
      - key: SAGE_API_KEYS
        generateValue: true
      - key: MEMORY_BACKEND
        value: in-memory
      - key: ARCHIVE_BACKEND
        value: in-memory
      - key: ENABLE_CONTINUITY
        value: "true"
      - key: GOOGLE_WORKSPACE_CREDENTIALS_PATH
        value: sage_data/credentials.json
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
