version: '3.8'

services:
  sage-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sage-continuity-runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persistent volume for SAGE ACR state serializations
      - sage_state_data:/app/.sage
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sage_state_data:
    name: sage_state_persistent_volume
